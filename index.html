<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda - Arias & Briyith</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #FDFBF7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border: 1px solid #D4AF37; }
        h1 { font-family: 'Great Vibes', cursive; color: #D4AF37; font-size: 3rem; margin-bottom: 20px; }
        input { padding: 12px; width: 80%; border: 1px solid #ddd; border-radius: 25px; margin-bottom: 20px; text-align: center; }
        button { background: #D4AF37; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #contenido { display: none; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <!-- PANTALLA DE SEGURIDAD -->
    <div id="login" class="login-card">
        <h1>Bienvenidos</h1>
        <p>Por favor, ingresa el código mágico de nuestra invitación:</p>
        <input type="password" id="pass" placeholder="Código de acceso">
        <br>
        <button onclick="validar()">Entrar</button>
    </div>

    <!-- CONTENIDO REAL DE LA BODA (Se oculta hasta poner la clave) -->
    <div id="contenido">
        <h1 style="margin-top: 50px;">¡Bienvenidos a nuestra historia!</h1>
        <p>Aquí irá toda tu invitación: Fotos, Mapa, RSVP...</p>
        <!-- Aquí pegaremos el diseño completo en el siguiente paso -->
    </div>

    <script>
        function validar() {
            var clave = document.getElementById("pass").value;
            // CAMBIA "1234" por la clave que tú quieras darle a tus invitados
            if (clave == "2612") { 
                document.getElementById("login").style.display = "none";
                document.getElementById("contenido").style.display = "block";
                document.body.style.display = "block"; // Permite scroll
            } else {
                alert("Código incorrecto, por favor revisa tu invitación física o mensaje.");
            }
        }
    </script>
</body>
</html>
